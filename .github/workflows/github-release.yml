# Create a GitHub Release when a version tag is pushed.
#
# Release notes are extracted from docs/CHANGELOG.md for the matching version.
# Tag must match pyproject.toml (same rule as publish-pypi.yml).
#
# Typical flow:
#   1. Commit release: Helix X.Y.Z (bump version + CHANGELOG)
#   2. git tag vX.Y.Z && git push origin vX.Y.Z
#   3. This workflow creates https://github.com/.../releases/tag/vX.Y.Z
#   4. publish-pypi.yml publishes HelixAgentAi to PyPI
name: GitHub Release

on:
  push:
    tags:
      - v*

concurrency:
  group: github-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Create release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches package version
        run: |
          EXPECTED="${{ steps.ver.outputs.version }}"
          ACTUAL=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "::error::Git tag v$EXPECTED does not match pyproject.toml version $ACTUAL"
            exit 1
          fi
          echo "Version OK: $ACTUAL"

      - name: Build release notes from CHANGELOG
        run: python scripts/changelog_release_notes.py "${{ steps.ver.outputs.version }}" > release-notes.md

      - name: Preview release notes
        run: head -n 40 release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Helix ${{ steps.ver.outputs.version }}
          body_path: release-notes.md
          draft: false
          prerelease: false
          make_latest: true