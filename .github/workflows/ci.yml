name: CI

on:
  push:
    branches: [main, master, "release/**", "refactor/**", "feature/**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.12"
          - os: ubuntu-latest
            python: "3.13"
          - os: ubuntu-latest
            python: "3.14"
          - os: windows-latest
            python: "3.14"
          - os: macos-latest
            python: "3.14"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Ruff
        run: uv run ruff check core cli api integrations tests

      - name: Pytest
        shell: bash
        run: uv run pytest -m "not llm" -q

      - name: Doctor (dry run)
        shell: bash
        env:
          HOLIX_HOME: ${{ runner.temp }}/helix-doctor
          TELEGRAM_BOT_TOKEN: ""
          HOLIX_TELEGRAM_BOT_TOKEN: ""
          PYTHONUTF8: "1"
          PYTHONIOENCODING: utf-8
        run: uv run holix doctor --no-llm

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Build package
        env:
          HOLIX_NO_VERSION_BUMP: "1"
        run: uv build --no-sources

      - name: Validate artifacts
        run: uv run twine check dist/*

      - name: Smoke install wheel
        run: |
          uv venv /tmp/helix-smoke --python 3.12
          uv pip install --python /tmp/helix-smoke/bin/python dist/holix-*.whl
          /tmp/helix-smoke/bin/holix version
          /tmp/helix-smoke/bin/holix --help

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --all-extras
      - name: Scan for committed secrets patterns
        run: |
          ! rg -i 'sk-[a-zA-Z0-9]{20,}' --glob '!*.md' --glob '!.github/**' || (echo "Possible API key in repo" && exit 1)
          ! rg 'TELEGRAM_BOT_TOKEN=[0-9]+:' .env 2>/dev/null || true