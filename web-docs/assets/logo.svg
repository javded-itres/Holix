<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="helix-a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5c0"/>
      <stop offset="50%" stop-color="#00b4d8"/>
      <stop offset="100%" stop-color="#7b61ff"/>
    </linearGradient>
    <linearGradient id="helix-b" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#48cae4"/>
      <stop offset="100%" stop-color="#00e5c0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- DNA backbone strands -->
  <path d="M20 6 C 36 14, 28 28, 44 36 C 52 40, 48 52, 32 58" stroke="url(#helix-a)" stroke-width="3" stroke-linecap="round" fill="none" filter="url(#glow)"/>
  <path d="M44 6 C 28 14, 36 28, 20 36 C 12 40, 16 52, 32 58" stroke="url(#helix-b)" stroke-width="3" stroke-linecap="round" fill="none" filter="url(#glow)"/>
  <!-- Base pairs -->
  <line x1="24" y1="14" x2="40" y2="14" stroke="#00e5c0" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="22" y1="24" x2="42" y2="24" stroke="#48cae4" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="24" y1="34" x2="40" y2="34" stroke="#00e5c0" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="26" y1="44" x2="38" y2="44" stroke="#48cae4" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="28" y1="52" x2="36" y2="52" stroke="#00e5c0" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <!-- Nodes -->
  <circle cx="20" cy="6" r="3" fill="#00e5c0"/>
  <circle cx="44" cy="6" r="3" fill="#48cae4"/>
  <circle cx="32" cy="58" r="3.5" fill="#7b61ff"/>
</svg>