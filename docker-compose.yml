services:
  helix:
    build: .
    ports:
      - "${HELIX_GATEWAY_PORT:-8000}:8000"
    environment:
      HELIX_ENV: production
      HELIX_REQUIRE_AUTH: "true"
      HELIX_API_KEY_PEPPER: ${HELIX_API_KEY_PEPPER:-change-me-in-production}
      MODEL: ${MODEL:-qwen2.5-coder:32b}
      BASE_URL: http://ollama:11434/v1
      API_KEY: ollama
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      HELIX_TELEGRAM_ALLOWED_USERS: ${HELIX_TELEGRAM_ALLOWED_USERS:-}
    volumes:
      - helix-data:/root/.helix
    depends_on:
      - ollama
    restart: unless-stopped
    networks:
      - helix-network

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    networks:
      - helix-network

volumes:
  ollama-data:
  helix-data:

networks:
  helix-network:
    driver: bridge